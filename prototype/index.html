<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RealHype Command OS 2026 — DEMO</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <aside>
    <div class="brand">REALHYPE<br><span>COMMAND OS</span></div>
    <div class="live">● LIVE OPS · DEMO</div>
    <nav id="nav"></nav>
    <footer>Banco desconectado<br>Protótipo visual v2026</footer>
  </aside>
  <main>
    <header><div><h1>Command Center</h1><p>Decisões prioritárias da operação.</p></div><input aria-label="Busca global" placeholder="Buscar lead, pedido ou SKU"><button>Atualizar</button></header>
    <div class="demo">DEMO VISUAL · DADOS FICTÍCIOS · SEM CONEXÃO AO NEON</div>
    <section class="metrics" id="metrics"></section>
    <section class="grid">
      <article><h2>Ações recomendadas</h2><div id="actions"></div></article>
      <article><h2>Atividade recente</h2><div id="activity"></div></article>
    </section>
    <article><h2>Operação</h2><div class="table-wrap"><table><thead><tr><th>Entidade</th><th>Status</th><th>Responsável</th><th>Próxima ação</th></tr></thead><tbody id="rows"></tbody></table></div></article>
  </main>
  <script src="app.js"></script>
</body>
</html>
